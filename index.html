<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroNerd Preflight</title>
    <style>
        :root {
            --bg-color: #0b111a; --card-bg: #15202b; --text-main: #e2e8f0;
            --accent-blue: #38bdf8; --accent-orange: #f97316;
            --vfr-green: #22c55e; --mvfr-blue: #3b82f6; --ifr-red: #ef4444; --lifr-magenta: #d946ef;
            --border-color: #334155;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }

        /* --- Header & Top Bar --- */
        .title-bar { text-align: center; position: relative; margin-bottom: 20px; }
        .title-bar h1 { margin: 0; color: var(--accent-blue); font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 900;}
        .tv-mode-btn { position: absolute; top: 0; right: 0; background: #334155; color: white; border: 1px solid #475569; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .tv-mode-btn:hover { background: #475569; }

        .header-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        
        .clock-box { display: flex; flex-direction: column; align-items: center; background: #0f172a; padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); min-width: 180px; }
        .clock-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; text-align: center;}
        .clock-time { font-size: 1.1rem; font-family: monospace; font-weight: bold; text-align: center;}
        
        #clock-dep { color: var(--accent-blue); }
        #clock-dest { color: var(--accent-orange); }
        #clock-zulu { color: #facc15; }

        .search-box { display: flex; flex-direction: column; gap: 5px; background: #1e293b; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);}
        .search-row { display: flex; gap: 5px; align-items: center;}
        .search-label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; width: 40px; text-align: right; color: #94a3b8;}
        .search-input { background-color: #0f172a; border: 1px solid var(--border-color); color: white; padding: 8px; font-size: 1.2rem; border-radius: 4px; text-transform: uppercase; width: 100px; text-align: center; outline: none; font-weight: bold; }
        .search-input:focus { border-color: var(--accent-blue); }
        .search-btn { background-color: var(--accent-blue); color: #000; border: none; padding: 10px 20px; font-size: 1rem; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; height: 100%; margin-left: 5px;}
        .search-btn:hover { background-color: #7dd3fc; }

        /* --- Tab System --- */
        .tabs-nav { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #1e293b; color: #94a3b8; border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: all 0.2s; font-size: 0.9rem;}
        .tab-btn.active { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }
        .tab-btn:hover:not(.active) { background: #334155; color: white;}
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Layout & Cards --- */
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;}
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px;}
